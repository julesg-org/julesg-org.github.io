# =============================================================================
# _quarto.yml — M@TE Quarto site configuration
# =============================================================================
#
# Quarto-based replica of the M@TE (Model Atlas of the Earth) website
# Original site: https://mate.science/
# Original source: https://github.com/ModelAtlasofTheEarth/website
# =============================================================================

project:
  type: website
  output-dir: _site

website:
  title: "M@TE"
  description: "Model Atlas of the Earth (M@TE)."

  # ── Top navigation bar ────────────────────────────────────────────────────
  navbar:
    background: "#F0F8FA"
    logo: images/atlas-icon.svg
    logo-alt: "M@TE logo"
    left:
      - text: "Home"
        href: index.qmd
      - text: "Models"
        href: models/index.qmd
      - text: "News"
        href: news/index.qmd
      - text: "About"
        href: about.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: github
        href: https://github.com/ModelAtlasofTheEarth
        aria-label: GitHub

  # ── Footer ────────────────────────────────────────────────────────────────
  page-footer:
    left: "© M@TE — Model Atlas of the Earth"
    right: "Built with [Quarto](https://quarto.org)"

# ── Output format ─────────────────────────────────────────────────────────────
format:
  html:
    theme: cosmo
    css: styles/mate.css
    toc: false
